# slam_toolbox.yaml - configuracao do SLAM Toolbox para mapeamento online
#
# Uso:
#   ros2 launch rm_localization slam.launch.py

slam_toolbox:
  ros__parameters:

    # Solver de otimizacao do grafo
    solver_plugin:           solver_plugins::CeresSolver
    ceres_linear_solver:     SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:    SCHUR_JACOBI
    ceres_trust_strategy:    LEVENBERG_MARQUARDT
    ceres_dogleg_type:       TRADITIONAL_DOGLEG
    ceres_loss_function:     None

    # Frames e topicos
    odom_frame: odom
    map_frame:  map
    base_frame: base_footprint
    scan_topic: /scan
    mode:       mapping

    # TF - timeouts maiores para simulacao
    transform_timeout:   0.5
    tf_buffer_duration: 30.0

    # Parametros do mapa
    resolution:       0.05    # metros por pixel
    max_laser_range: 12.0

    # Movimento minimo para adicionar um novo no ao grafo
    minimum_travel_distance: 0.3
    minimum_travel_heading:  0.3

    # Loop closure
    do_loop_closing: true